<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nour Aesthetic | لوحات عربية راقية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <style>
        /* نفس التنسيق السابق (مختصر لتوفير المساحة) */
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --beige:#F5F0EB;--beige-dark:#E8DDD3;--light-brown:#B8956A;--gold:#D4A847;
            --white:#FFFFFF;--off-white:#FDFBF9;--text-dark:#2C1810;--text-light:#8B7355;
            --shadow-sm:0 2px 8px rgba(92,74,46,0.08);--shadow-lg:0 8px 40px rgba(92,74,46,0.16);
            --transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        body{font-family:'Cairo',sans-serif;background:var(--off-white);color:var(--text-dark);line-height:1.8}
        .container{max-width:1300px;margin:0 auto;padding:0 30px}
        .section{padding:100px 0}
        .section-title{font-family:'Aref Ruqaa',serif;font-size:2.5rem;text-align:center;margin-bottom:15px}
        .section-divider{width:80px;height:3px;background:linear-gradient(90deg,var(--gold),var(--light-brown));margin:0 auto 25px;border-radius:2px}
        
        .products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:40px}
        .product-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:var(--shadow-sm);transition:var(--transition);border:1px solid rgba(184,149,106,0.1)}
        .product-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-8px)}
        .product-image-wrapper{position:relative;overflow:hidden;aspect-ratio:4/3;background:var(--beige);cursor:pointer}
        .product-image-wrapper img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(0.25,0.46,0.45,0.94)}
        .product-card:hover .product-image-wrapper img{transform:scale(1.08)}
        .product-badge{position:absolute;top:15px;right:15px;background:linear-gradient(135deg,var(--gold),#B8922E);color:#fff;padding:6px 16px;border-radius:20px;font-size:.8rem;font-weight:700}
        .product-info{padding:25px 30px 30px}
        .product-category{font-size:.8rem;color:var(--gold);font-weight:600;margin-bottom:5px}
        .product-name{font-family:'Aref Ruqaa',serif;font-size:1.45rem;font-weight:700;color:var(--text-dark);margin-bottom:10px}
        .product-desc{font-size:.92rem;color:var(--text-light);margin-bottom:20px;line-height:1.8}
        .product-bottom{display:flex;align-items:center;justify-content:space-between;gap:15px;flex-wrap:wrap}
        .product-price{font-size:1.5rem;font-weight:800;color:var(--light-brown)}
        .btn-whatsapp-order{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;padding:12px 24px;border-radius:30px;text-decoration:none;font-weight:700;font-size:.9rem;transition:var(--transition)}
        .btn-whatsapp-order:hover{background:#1DA851;transform:translateY(-2px)}
    </style>
</head>
<body>

    <!-- Navbar + Hero (نفس السابق) -->
    <!-- ... (تم الاحتفاظ بالهيدر والـ Hero كما هو) ... -->

    <section class="section products-section" id="products">
        <div class="container">
            <div class="section-header" style="text-align:center;margin-bottom:60px">
                <div style="color:#D4A847;font-family:'Aref Ruqaa',serif">✦ تشكيلة مميزة ✦</div>
                <h2 class="section-title">مجموعتنا الفنية</h2>
                <div class="section-divider"></div>
            </div>

            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <script>
        const waNumber = "96181939426";
        const waBase = "https://wa.me/" + waNumber;
        const productPrice = "$15";

        const products = [
            {
                img: "https://i.imgur.com/C2ueBrn.jpeg",
                badge: "مميز",
                cat: "خط عربي",
                name: "لوحة الضياء الذهبي",
                desc: "تصميم راقي بألوان ذهبية دافئة يضفي على المكان أجواء فخمة وهادئة."
            },
            {
                img: "https://i.imgur.com/v34EwQL.jpeg",
                badge: "جديد",
                cat: "زخارف هندسية",
                name: "لوحة الزخارف الملكية",
                desc: "تصميم هندسي أنيق مستوحى من الفن العربي الكلاسيكي بتفاصيل دقيقة."
            },
            {
                img: "https://i.imgur.com/qlFOXa9.jpeg",
                badge: "",
                cat: "فن عربي",
                name: "لوحة النور الأنيق",
                desc: "لوحة بتصميم راقي وخطوط متوازنة تعطي المكان إحساساً بالفخامة."
            },
            {
                img: "https://i.imgur.com/6BIgquS.jpeg",
                badge: "الأكثر مبيعاً",

                name: "لوحة الأصالة الذهبية",
                desc: "مزيج جميل بين التراث والتصميم العصري بألوان دافئة وأنيقة."
            },
            {
                img: "https://i.imgur.com/waVRipH.jpeg",
                badge: "",
                cat: "خط ديواني",
                name: "لوحة الخط الملكي",
                desc: "تصميم بخط ديواني أنيق يجمع بين الجمال والرقي في آنٍ واحد."
            },
            {
                img: "https://i.imgur.com/yaahq7F.jpeg",
                badge: "حصري",
                cat: "فن هندسي",
                name: "لوحة التناغم الهندسي",
                desc: "تصميم هندسي متناسق يعكس الذوق الرفيع والجمال البصري."
            },
            {
                img: "https://i.imgur.com/ewU9kGC.jpeg",
                badge: "",
                cat: "تراث عربي",
                name: "لوحة التراث الذهبي",
                desc: "لوحة مستوحاة من التراث العربي بلمسة عصرية وألوان دافئة."
            },
            {

                badge: "إصدار محدود",
                cat: "فن راقي",
                name: "لوحة الهدوء الراقي",
                desc: "تصميم هادئ وأنيق يمنح المكان شعوراً بالسكينة والجمال."
            }
        ];

        const grid = document.getElementById('productsGrid');

        products.forEach((p, i) => {
            const badgeHTML = p.badge ? `<span class="product-badge">${p.badge}</span>` : '';
            const waMsg = encodeURIComponent(`مرحبا، حابب أطلب: ${p.name} - السعر: ${productPrice}`);
            const waLink = `${waBase}?text=${waMsg}`;

            grid.innerHTML += `
                <div class="product-card fade-up" style="transition-delay:${i * 0.1}s">
                    <div class="product-image-wrapper" onclick="openModal(this.querySelector('img'))">
                        <img src="${p.img}" alt="${p.name}" loading="lazy">
                        ${badgeHTML}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.cat}</div>
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-desc">${p.desc}</p>
                        <div class="product-bottom">
                            <div class="product-price">${productPrice} <small>USD</small></div>
                            <a href="${waLink}" target="_blank" class="btn-whatsapp-order">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                اطلب عبر واتساب
                            </a>
                        </div>
                    </div>
                </div>`;
        });
    </script>

</body>
</html>
